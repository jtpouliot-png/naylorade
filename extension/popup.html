<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f6f4;
      color: #1a1917;
      width: 320px;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 13px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e8e6e2;
    }

    .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
    .logo-sub { font-size: 9px; color: #a8a5a0; letter-spacing: 0.08em; text-transform: uppercase; }

    .section { padding: 14px 16px; border-bottom: 1px solid #e8e6e2; background: #ffffff; }

    .label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a8a5a0;
      margin-bottom: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: #4caf50; }
    .dot.red    { background: #e53935; }
    .dot.yellow { background: #f9a825; }

    input[type="text"] {
      width: 100%;
      background: #f7f6f4;
      border: 1px solid #d0cdc8;
      color: #1a1917;
      padding: 8px 10px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      outline: none;
      border-radius: 0;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #1a1917; }
    input[type="text"]::placeholder { color: #a8a5a0; }

    .btn-primary {
      width: 100%;
      background: #1a1917;
      color: #f7f6f4;
      border: none;
      padding: 11px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.82; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid #d0cdc8;
      color: #6b6760;
      padding: 9px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-secondary:hover { border-color: #1a1917; color: #1a1917; }

    .actions { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }

    .player-list { padding: 0 16px 14px; }
    .player-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #f0eeeb;
      font-size: 12px;
    }
    .player-item:last-child { border-bottom: none; }
    .player-dot { width: 4px; height: 4px; border-radius: 50%; background: #1a1917; flex-shrink: 0; }

    .error { padding: 10px 12px; background: #fff5f5; border: 1px solid #fcd5d5; color: #c0392b; font-size: 11px; line-height: 1.5; border-radius: 2px; }
    .success-msg { font-size: 11px; color: #a8a5a0; padding: 8px 16px 0; }

    details { border-bottom: 1px solid #e8e6e2; }
    summary {
      padding: 10px 16px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a8a5a0;
      cursor: pointer;
      background: #ffffff;
      user-select: none;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after { content: ' ›'; }
    details[open] summary::after { content: ' ‹'; }
    .settings-body { padding: 12px 16px 14px; background: #fff; }
    .settings-row { margin-bottom: 10px; }
    .settings-label { font-size: 10px; color: #a8a5a0; margin-bottom: 5px; letter-spacing: 0.04em; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #e8e6e2;
      border-top-color: #1a1917;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">Naylorade</span>
    <span class="logo-sub">Roster Sync</span>
  </header>

  <!-- ESPN Status -->
  <div class="section">
    <div class="label">ESPN</div>
    <div class="status-row" id="espn-status">
      <div class="dot yellow"></div>
      <span>Checking cookies...</span>
    </div>
  </div>

  <!-- League ID -->
  <div class="section">
    <div class="label">League ID</div>
    <input type="text" id="league-id" placeholder="e.g. 123456" />
    <div style="font-size: 10px; color: #a8a5a0; margin-top: 6px;">Auto-detected if you're on ESPN Fantasy now</div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-primary" id="sync-btn" disabled>Sync Roster</button>
    <button class="btn-secondary" id="open-btn" style="display:none">Open Naylorade →</button>
  </div>

  <!-- Error -->
  <div id="error-box" style="display:none; padding: 0 16px 12px;"></div>

  <!-- Player list -->
  <div id="player-list-wrap" style="display:none">
    <div class="success-msg" id="success-msg"></div>
    <div class="player-list" id="player-list"></div>
  </div>

  <!-- Settings -->
  <details id="settings-details">
    <summary>Settings</summary>
    <div class="settings-body">
      <div class="settings-row">
        <div class="settings-label">Backend URL (your Railway URL)</div>
        <input type="text" id="api-url" placeholder="https://your-app.up.railway.app" />
      </div>
      <div class="settings-row">
        <div class="settings-label">Naylorade URL</div>
        <input type="text" id="app-url" placeholder="https://naylorade.vercel.app" />
      </div>
      <button class="btn-secondary" id="save-settings-btn" style="margin-top:4px">Save Settings</button>
    </div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
